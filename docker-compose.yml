services:
  backend:
    build:
      context: ./backend
    environment:
      SEMIPLM_DATABASE_URL: sqlite:////data/semiplm.db
    ports:
      - "8000:8000"
    volumes:
      - semiplm-data:/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  semiplm-data:
